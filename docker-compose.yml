services:
  # NodeODM 处理服务（对外暴露 3000 方便调试）
  nodeodm:
    image: opendronemap/nodeodm:gpu
    ports:
      - "3000:3000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/info')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - odm_net

  # FastAPI 中间件服务（对内访问 NodeODM，对外暴露 8000）
  odm-middleware:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NODEODM_HOST=nodeodm
      - NODEODM_PORT=3000
      - WEBHOOK_BASE_URL=http://odm-middleware:8000
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_PORT=${MQTT_PORT}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_TOPIC_PREFIX=${MQTT_TOPIC_PREFIX}
    volumes:
      - odm_tasks_data:/tmp/odm_tasks
    depends_on:
      nodeodm:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - odm_net

volumes:
  odm_tasks_data:

networks:
  odm_net:
    driver: bridge
